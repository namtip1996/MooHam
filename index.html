<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peace Treaty 💖</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffb6c1,#ffd6e7,#ffe9f3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}
.card{
    background:white;
    padding:40px;
    border-radius:30px;
    text-align:center;
    max-width:600px;
    width:90%;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}
h1{
    color:#ff4f8b;
    font-size:2.3rem;
}
p{
    font-size:1.2rem;
    color:#444;
    line-height:1.8;
}
.buttons{
    margin-top:30px;
    height:140px;
    position:relative;
}
button{
    border:none;
    padding:14px 28px;
    border-radius:999px;
    cursor:pointer;
    font-size:1rem;
    transition:.2s;
}
#yesBtn{
    background:#ff4f8b;
    color:white;
}
#noBtn{
    position:absolute;
    background:#888;
    color:white;
}
button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>
<div class="card">
<h1>🥺💖 ดีกันนะน้องหมูแฮม 💖🥺</h1>
<p>
เค้างอนแล้ว...<br>
เค้าคิดถึงแล้ว...<br>
เค้าอยากดีกับน้องหมูแฮมแล้ว... 🥹💕
</p>
<p>
ดังนั้นโปรดเลือกคำตอบที่ถูกต้องด้านล่าง 👇
</p>
<div class="buttons">
<button id="yesBtn">
🥰 โอเค
</button>
<button id="noBtn">
😤 ไม่
</button>
</div>
</div>
<script>
const noBtn = document.getElementById("noBtn");
function moveButton(){
    const maxX = window.innerWidth - 180;
    const maxY = window.innerHeight - 100;
    noBtn.style.left = Math.random()*maxX + "px";
    noBtn.style.top = Math.random()*maxY + "px";
}
noBtn.addEventListener("mouseover", moveButton);
document.addEventListener("mousemove",(e)=>{
    const rect=noBtn.getBoundingClientRect();
    const distance=Math.hypot(
        e.clientX-(rect.left+rect.width/2),
        e.clientY-(rect.top+rect.height/2)
    );
    if(distance < 180){
        moveButton();
    }
});
document.getElementById("yesBtn").addEventListener("click",()=>{
    confetti({
        particleCount:250,
        spread:120,
        origin:{y:0.6}
    });
    document.querySelector(".card").innerHTML=`
    <h1>🎉💖 ยินดีด้วย 💖🎉</h1>
    <p style="font-size:1.4rem;">
    คุณได้รับสิทธิ์เป็นหวานใจ<br>
    ตั้งแต่บัดนี้เป็นต้นไป 🥰💕
    </p>
    <p>
    ไม่มีการคืนสิทธิ์<br>
    ไม่มีการยกเลิกสัญญา<br>
    และไม่มีการอุทธรณ์ 🤣
    </p>
    <h2>
    ❤️🍓🌷✨
    </h2>
    `;
});
</script>
</body>
</html>
